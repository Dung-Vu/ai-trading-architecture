[server]
protocol = http
http_port = 3000

[security]
admin_user = admin
admin_password = admin
allow_sign_up = false

[auth.anonymous]
enabled = false

[log]
mode = console
level = info

[log.console]
format = json

[paths]
provisioning = /etc/grafana/provisioning

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/trading_dashboard.json
