[server]
protocol = http
http_port = 3000

[security]
admin_user = admin
; admin_password is set via GF_SECURITY_ADMIN_PASSWORD env var in docker-compose
allow_sign_up = false

[auth.anonymous]
enabled = false

[log]
mode = console
level = info

[log.console]
format = json

[paths]
provisioning = /etc/grafana/provisioning

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/trading_dashboard.json
