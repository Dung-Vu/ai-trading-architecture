apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    uid: postgres
    access: proxy
    url: trading-postgres:5432
    database: trading_db
    user: trading_user
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-trading_pass}
    jsonData:
      postgresVersion: 1500
      timescaledb: false
      sslmode: disable
    editable: true
